project:
  type: book
  output-dir: _book

knitr:
  opts_chunk:
    message: false
    warning: false
    fig.width: 8
    fig.height: 5
    fig.dpi: 150

execute:
  echo: true
  freeze: auto

book:
  title: "羅氏眼科臨床研究賦能工作坊教材"
  subtitle: "讓你的 Faricimab RWE 長得像 Ophthalmology 論文"
  author:
    - "和信治癌中心醫院 林協霆醫師"
    - "羅氏大藥廠 邵時傑博士"
  date: "2026/05/30"
  reader-mode: true
  page-footer:
    left: |
      © 2026 林協霆、邵時傑 · 教材授權 CC BY 4.0 · 主辦單位：羅氏大藥廠
    right: |
      Built with [Quarto](https://quarto.org/)
  chapters:
    - index.qmd
    - primer.qmd
    - part1.qmd
    - part2.qmd
    - part3.qmd
    - part4.qmd
    - part5.qmd
    - part6.qmd
    - appendix.qmd

bibliography: references.bib
csl: american-medical-association.csl

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: false
    code-tools: true
    code-copy: true
    css: styles.css
  pdf:
    documentclass: scrbook
    pdf-engine: xelatex
    papersize: a4
    fontsize: 11pt
    geometry:
      - top=25mm
      - bottom=25mm
      - left=22mm
      - right=22mm
    toc: true
    toc-depth: 3
    number-sections: true
    colorlinks: true
    linkcolor: NavyBlue
    urlcolor: NavyBlue
    citecolor: NavyBlue
    mainfont: "Helvetica Neue"
    sansfont: "Helvetica Neue"
    monofont: "Menlo"
    CJKmainfont: "Noto Serif CJK TC"
    CJKsansfont: "Noto Sans CJK TC"
    CJKmonofont: "Noto Sans CJK TC"
    code-block-bg: "#f7f7f7"
    code-overflow: wrap
    fig-pos: "H"
    include-in-header:
      text: |
        \usepackage{xeCJK}
        \setCJKmainfont[BoldFont={Noto Sans CJK TC Bold}]{Noto Serif CJK TC}
        \XeTeXlinebreaklocale "zh"
        \XeTeXlinebreakskip = 0pt plus 1pt
        \usepackage{float}
        \usepackage{fvextra}
        \DefineVerbatimEnvironment{Highlighting}{Verbatim}{breaklines,commandchars=\\\{\}}
        \usepackage[headsepline]{scrlayer-scrpage}
        \clearpairofpagestyles
        \ohead[\small Document Number: M-TW-00008758]{\small Document Number: M-TW-00008758}
        \cfoot[\pagemark]{\pagemark}
        \pagestyle{scrheadings}
